<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaskGXT Crystal Explorer</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #f0f4f8;
        color: #1a202c;
        font-family: 'Inter', system-ui, sans-serif;
        height: 100dvh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── Category bar ─── */
      #cat-bar {
        padding: 7px 12px;
        background: #ffffff;
        border-bottom: 1px solid #cbd5e0;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #cat-bar label {
        font-size: 0.8rem;
        color: #718096;
        white-space: nowrap;
      }
      #cat-select {
        flex: 1;
        background: #edf2f7;
        color: #2d3748;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 0.88rem;
        cursor: pointer;
        outline: none;
      }
      #cat-select:focus { border-color: #4299e1; }

      /* ─── Main ─── */
      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* ─── Formula list ─── */
      #formula-list {
        width: 150px;
        flex-shrink: 0;
        overflow-y: auto;
        background: #ffffff;
        border-right: 1px solid #cbd5e0;
        padding: 3px 0;
      }
      #formula-list::-webkit-scrollbar { width: 4px; }
      #formula-list::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 2px; }
      .formula-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        padding: 5px 9px;
        background: transparent;
        border: none;
        color: #4a5568;
        text-align: left;
        cursor: pointer;
        font-size: 0.76rem;
        line-height: 1.3;
        transition: background .1s, color .1s;
      }
      .formula-item:hover { background: #edf2f7; color: #1a202c; }
      .formula-item.active { background: #bee3f8; color: #2b6cb0; font-weight: 600; }
      .badge {
        background: #e2e8f0; color: #4a5568; border-radius: 8px;
        padding: 1px 5px; font-size: 0.65rem; flex-shrink: 0; margin-left: 3px;
      }
      .formula-item.active .badge { background: #90cdf4; color: #2c5282; }

      /* ─── Viewer ─── */
      #viewer {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        position: relative;
      }

      /* Canvas fills the viewer */
      #canvas-wrap {
        flex: 1;
        position: relative;
        overflow: hidden;
        background: #f0f4f8;
      }
      #canvas-wrap canvas { display: block; }

      /* ─── Polymorph arrows: centred vertically on the canvas ─── */
      .poly-arrow {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(255,255,255,0.82);
        border: 1px solid #a0aec0;
        border-radius: 50%;
        width: 38px;
        height: 38px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        color: #2d3748;
        cursor: pointer;
        z-index: 10;
        transition: background .12s, opacity .12s;
        user-select: none;
      }
      .poly-arrow:disabled {
        opacity: 0.2;
        cursor: default;
      }
      .poly-arrow:not(:disabled):hover { background: rgba(255,255,255,0.97); }
      #prev-btn { left: 10px; }
      #next-btn { right: 10px; }

      /* ─── Legend ─── */
      #legend {
        position: absolute;
        bottom: 10px;
        right: 12px;
        background: rgba(255,255,255,0.88);
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 0.88rem;
        color: #2d3748;
        display: flex;
        flex-direction: column;
        gap: 5px;
        pointer-events: none;
        max-height: 55%;
        overflow: hidden;
      }
      .legend-item { display: flex; align-items: center; gap: 7px; }
      .legend-dot {
        width: 14px; height: 14px; border-radius: 50%;
        flex-shrink: 0; border: 1px solid rgba(0,0,0,0.15);
      }

    </style>
  </head>
  <body>
    <div id="cat-bar">
      <label for="cat-select">Category</label>
      <select id="cat-select"></select>
    </div>
    <div id="main">
      <div id="formula-list"></div>
      <div id="viewer">
        <div id="canvas-wrap">
          <button class="poly-arrow" id="prev-btn" disabled>◀</button>
          <button class="poly-arrow" id="next-btn" disabled>▶</button>
          <div id="legend"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
